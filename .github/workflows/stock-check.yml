name: TCG Stock Check

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:
    inputs:
      test_ping:
        description: "Send a test Discord ping instead of checking stock"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit state.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run stock check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.inputs.test_ping }}" = "true" ]; then
            python -m tcg_notifier --test
          else
            python -m tcg_notifier --once
          fi

      - name: Save state
        run: |
          git config user.name  "tcg-notifier[bot]"
          git config user.email "tcg-notifier[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update state [skip ci]"
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt $attempt), rebasing and retrying..."
            git pull --rebase
            git add state.json
          done
