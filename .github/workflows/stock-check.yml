name: TCG Stock Check

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # allows manual trigger from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit state.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m tcg_notifier --once

      - name: Save state
        run: |
          git config user.name  "tcg-notifier[bot]"
          git config user.email "tcg-notifier[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
