name: Discord Command Handler (disabled)
# Command processing has been moved into stock-check.yml
# so it runs on the same reliable schedule. This file is kept
# for reference but the workflow is disabled.

on:
  workflow_dispatch:    # manual only, no longer runs on schedule

jobs:
  handle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process Discord commands
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python -m tcg_notifier.discord_commands

      - name: Commit updated config and state
        run: |
          git config user.name  "tcg-notifier[bot]"
          git config user.email "tcg-notifier[bot]@users.noreply.github.com"
          git add config.yaml discord_state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: apply Discord commands [skip ci]"
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt $attempt), rebasing..."
            git pull --rebase
            git add config.yaml discord_state.json
          done
